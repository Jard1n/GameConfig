bind "SHIFT" "+sprint"
bind "ALT" "+quickdrop"
bind "CTRL" "+duck"
bind "F1" "buy ak47;buy m4a1;buy vesthelm;buy smokegrenade;buy flashbang;buy hegrenade;buy molotov;buy Incgrenade;buy defuser;"
bind "F2" "buy awp;buy vesthelm;"
bind "F3" "buy deagle;buy vest;"
bind "F4" "sellbackall"
bind "=" "say_team !drop"                 // 发刀
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "MOUSE3" "player_ping"
bind "MOUSE4" "+voicerecord"
bind "MOUSE5" "+jump;-jump;jumpthrow"
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"
bind "UPARROW" "bot_add"                 // 添加bot
bind "LEFTARROW" "bot_stop 1;bot_place"  // 放置bot
bind "DOWNARROW" "bot_kick"              // 删除bot
bind "RIGHTARROW" "mp_restartgame 1"     // 重新开始游戏

//─────────────────────   大跳   ─────────────────────────────
alias +cjump "+jump; +duck"
alias -cjump "-jump; -duck"
bind "space" "+cjump"

//─────────────────────   跳投   ─────────────────────────────
bind  MOUSE5 "+jump;-jump;jumpthrow"
alias jumpthrow "-attack;-attack2"

//─────────────────────   快速丢包   ──────────────────────────
alias +quickdrop "slot5"
alias -quickdrop "drop"
bind Alt "+quickdrop"


