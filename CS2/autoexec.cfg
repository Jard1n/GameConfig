cl_crosshair_drawoutline                 0        // 是否开启轮廓
cl_crosshair_outlinethickness		     1.0      // 轮廓
cl_crosshaircolor                        5        // 自定义颜色
cl_crosshaircolor_r                      0        // 红色
cl_crosshaircolor_g                      255      // 绿色
cl_crosshaircolor_b                      255      // 蓝色
